<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empanada Orders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fff5e6 0%, #ffe4c4 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 40px 30px;
    }
    h1 {
      text-align: center;
      color: #d35400;
      margin-bottom: 8px;
      font-size: 2rem;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .price-box {
      background: #fef3e2;
      border: 2px dashed #e67e22;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 30px;
    }
    .price { font-size: 1.8rem; color: #d35400; font-weight: bold; }
    .price-note { color: #666; font-size: 0.9rem; margin-top: 5px; }
    
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e67e22;
    }
    
    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .qty-btn {
      width: 45px; height: 45px;
      border: none;
      background: #e67e22;
      color: white;
      font-size: 1.5rem;
      border-radius: 50%;
      cursor: pointer;
    }
    .qty-btn:hover { background: #d35400; }
    .qty-display {
      font-size: 1.5rem;
      font-weight: bold;
      min-width: 100px;
      text-align: center;
    }
    .total {
      font-size: 1.2rem;
      color: #27ae60;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      padding: 15px;
      background: #e8f8f0;
      border-radius: 8px;
    }
    
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #219a52; }
    
    .payment-info {
      margin-top: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      text-align: center;
    }
    .payment-info h3 { color: #333; margin-bottom: 10px; }
    .etransfer { 
      font-size: 1.1rem; 
      color: #2980b9; 
      font-weight: bold;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🥟 Homemade Empanadas</h1>
    <p class="subtitle">Fresh, delicious, made with love!</p>
    
    <div class="price-box">
      <div class="price">2 for $25</div>
      <div class="price-note">Minimum order: 2 empanadas</div>
    </div>

    <!-- Replace YOUR_FORM_ID with your Formspree form ID -->
    <form action="[formspree.io](https://formspree.io/f/xaqpbjvq)" method="POST">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label>How many packs? (2 empanadas per pack)</label>
      <div class="quantity-selector">
        <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-display"><span id="qty">1</span> pack(s)</div>
        <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <input type="hidden" id="quantity" name="quantity" value="1 pack (2 empanadas)">

      <div class="total">Total: $<span id="total">25</span></div>

      <label for="notes">Special Requests / Notes</label>
      <textarea id="notes" name="notes" rows="3" placeholder="Any allergies or preferences?"></textarea>

      <input type="hidden" name="_subject" value="New Empanada Order!">
      
      <button type="submit">Place Order</button>
    </form>

    <div class="payment-info">
      <h3>💳 Payment via e-Transfer</h3>
      <p>Send payment to:</p>
      <p class="etransfer">your-email@example.com</p>
      <p style="margin-top: 10px; color: #666; font-size: 0.9rem;">
        Please include your name in the e-Transfer message
      </p>
    </div>
  </div>

  <script>
    let qty = 1;
    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById('qty').textContent = qty;
      document.getElementById('total').textContent = qty * 25;
      document.getElementById('quantity').value = qty + ' pack(s) (' + (qty * 2) + ' empanadas)';
    }
  </script>
</body>
</html>
